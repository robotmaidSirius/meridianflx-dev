; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
description = "Meridian"はヒューマノイドロボットの制御や開発を円滑にするためのオープンソースプロジェクトです.

[env:Meridian_TWIN_ESP32]
platform = espressif32
board = esp32dev
framework = arduino
build_type = release
build_flags =
	-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_NONE
monitor_speed = 1000000
lib_deps =
	ninagawa123/Meridian@^0.1.0
	hideakitai/ESP32DMASPI@0.3.0
board_build.partitions = no_ota.csv

[env:Meridian_TWIN_Tsy40]
platform = teensy
board = teensy40
framework = arduino
monitor_speed = 6000000
lib_deps =
	ninagawa123/Meridian@^0.1.0
	hideakitai/TsyDMASPI@^0.1.3
	electroniccats/MPU6050@^0.5.0
	adafruit/Adafruit MPU6050@^2.2.1
	adafruit/Adafruit BusIO@^1.15.0
	adafruit/Adafruit Unified Sensor@^1.1.14
	adafruit/Adafruit BNO055@^1.6.3

[env:Meridian_Lite_ESP32]
platform = espressif32
board = esp32dev
framework = arduino
build_type = release
build_flags =
	-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_NONE
	-D TX1=27
	-D RX1=32
monitor_speed = 115200
lib_deps =
	ninagawa123/Meridian@^0.1.0
#	adafruit/Adafruit BNO055@^1.5.3
#	electroniccats/MPU6050@^0.5.0

board_build.partitions = no_ota.csv

