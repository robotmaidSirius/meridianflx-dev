; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
description = "Meridian"はヒューマノイドロボットの制御や開発を円滑にするためのオープンソースプロジェクトです.

[env]
test_build_src = yes
platform_packages = tool-cppcheck
check_tool = cppcheck
check_flags = --enable=all
check_src_filters =
	+<lib/Meridian/**>
	+<src/**>
extra_scripts =
	pre:tools/scripts/build_pre.py
build_flags =
	-D $PIOENV
	-D BUILD_TIME=$UNIX_TIME

[env:MERIDIAN_TWIN_TSY40]
platform = teensy
board = teensy40
framework = arduino
monitor_speed = 6000000
lib_deps =
	ninagawa123/Meridian@^0.1.0
	hideakitai/TsyDMASPI@^0.1.3
	electroniccats/MPU6050@^0.5.0
	adafruit/Adafruit MPU6050@^2.2.1
	adafruit/Adafruit BusIO@^1.15.0
	adafruit/Adafruit Unified Sensor@^1.1.14
	adafruit/Adafruit BNO055@^1.6.3
build_flags =
	-D MERIDIAN_TWIN_TSY40
lib_extra_dirs =
	lib/3rd_party/Arduino
	lib/Meridian/Core
	lib/Meridian/Teensy40

[env:MERIDIAN_TWIN_ESP32]
platform = espressif32
board = esp32dev
framework = arduino
build_type = release
build_flags =
	-D MERIDIAN_TWIN_ESP32
	-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_NONE
	-D TX1=27
	-D RX1=32
monitor_speed = 1000000
lib_deps =
	ninagawa123/Meridian@^0.1.0
	hideakitai/ESP32DMASPI@0.3.0
	adafruit/Adafruit BNO055@^1.5.3
	electroniccats/MPU6050@^0.5.0
board_build.partitions = no_ota.csv
lib_extra_dirs =
	lib/3rd_party/Arduino
	lib/Meridian/Core
	lib/Meridian/ESP32

[env:MERIDIAN_LITE_ESP32]
platform = espressif32
board = esp32dev
framework = arduino
build_type = release
build_flags =
	-D MERIDIAN_LITE_ESP32
	-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_NONE
	-D TX1=27
	-D RX1=32
monitor_speed = 115200
lib_deps =
	ninagawa123/Meridian@^0.1.0
	adafruit/Adafruit BNO055@^1.5.3
	electroniccats/MPU6050@^0.5.0
lib_extra_dirs =
	lib/3rd_party/Arduino
	lib/Meridian/Core
	lib/Meridian/ESP32

#board_build.partitions = no_ota.csv

