; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
description = "Meridian"はヒューマノイドロボットの制御や開発を円滑にするためのオープンソースプロジェクトです.

[env]
test_build_src = yes
platform_packages = tool-cppcheck
check_tool = cppcheck
check_flags = --enable=all
check_src_filters =
	+<lib/Meridian/**>
	+<src/**>
extra_scripts =
	pre:tools/scripts/mrd_build_pre.py
build_flags =
	-D $PIOENV
	-D BUILD_BOARD_NAME=\"$PIOENV\"
#	-D BUILD_TIME=$UNIX_TIME
#	-D BUILD_VERSION=\"1.0.0\"
#	-D SETTING_DEFAULT_DELAY_TIME_MS=2000
#	-D ENABLE_ETHERNET
#	-D ETHERNET_DEFAULT_PIN_RESET=15
#	-D SETTINGS_DEFAULT_MAC_ADDRESS="\"0E:9D:47:90:FC:AF\""

[env:Meridian_TWIN_Tsy40]
platform = teensy
board = teensy40
framework = arduino
build_type = release
monitor_speed = 6000000
lib_deps =
	ninagawa123/Meridian@^0.1.0
	hideakitai/TsyDMASPI@^0.1.3
	adafruit/Adafruit BusIO@^1.15.0
	adafruit/Adafruit Unified Sensor@^1.1.14
#	electroniccats/MPU6050@^0.5.0
#	adafruit/Adafruit BNO055@^1.6.3
build_flags =
	${env.build_flags}
lib_extra_dirs =
	lib/3rd_party/Arduino
	lib/Meridian/Core
	lib/Meridian/Teensy40

[env:Meridian_TWIN_ESP32]
platform = espressif32
board = esp32dev
framework = arduino
build_type = release
monitor_speed = 1000000
build_flags =
	${env.build_flags}
	-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_NONE
	-D TX1=27
	-D RX1=32
lib_deps =
	ninagawa123/Meridian@^0.1.0
#	hideakitai/ESP32DMASPI@0.3.0
#	adafruit/Adafruit BNO055@^1.5.3
#	electroniccats/MPU6050@^0.5.0
board_build.partitions = no_ota.csv
lib_extra_dirs =
	lib/3rd_party/Arduino
	lib/Meridian/Core
	lib/Meridian/ESP32

[env:Meridian_LITE_ESP32]
platform = espressif32
board = esp32dev
framework = arduino
build_type = release
monitor_speed = 115200
build_flags =
