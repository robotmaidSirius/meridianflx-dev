name: Check pull request
on:
  pull_request:
    branches:
    - main
    - develop*

jobs:
  Build_MERIDIAN_LITE_ESP32:
    uses: ./.github/workflows/_WORKFLOW_CALL_RunningPlatformIO.yml
    with:
      board_env: Meridian_LITE_ESP32
      firmware_name: Meridian_LITE_for_ESP32
  Build_MERIDIAN_TWIN_ESP32:
    uses: ./.github/workflows/_WORKFLOW_CALL_RunningPlatformIO.yml
    with:
      board_env: Meridian_TWIN_ESP32
      firmware_name: Meridian_TWIN_for_ESP32
  Build_MERIDIAN_TWIN_TSY40:
    uses: ./.github/workflows/_WORKFLOW_CALL_RunningPlatformIO.yml
    with:
      board_env: Meridian_TWIN_Tsy40
      firmware_name: Meridian_TWIN_for_Tsy40
      ext_name: hex
  Build_MERIDIAN_LITE_M5STACK_ATOM:
    uses: ./.github/workflows/_WORKFLOW_CALL_RunningPlatformIO.yml
    with:
      board_env: Meridian_LITE_M5StackAtom
      firmware_name: Meridian_LITE_for_M5StackAtom
